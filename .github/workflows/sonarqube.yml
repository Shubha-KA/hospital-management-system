name: SonarQube CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages 
        uses: actions/cache@v4 
        with: 
          path: ~/.m2 
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }} 
          restore-keys: | 
            maven-${{ runner.os }} 
          
      - name: Build and SonarQube Scan 
        run: | 
          mvn clean verify sonar:sonar \ 
            -DskipTests \ 
            -Dsonar.projectKey=hospital-management-system \ 
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \ 
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} 
        
      - name: Wait for Quality Gate 
        id: qualitygate 
        run: | 
          sleep 20 STATUS=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: \ 
          "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=hospital-management-system" \ 
          | jq -r '.projectStatus.status') 
          
          echo "Quality Gate Status: $STATUS" 
          echo "status=$STATUS" >> $GITHUB_OUTPUT 
      
      - name: Send Email - Failure 
        if: steps.qualitygate.outputs.status != 'OK' 
        uses: dawidd6/action-send-mail@v3 
        with: 
          server_address: smtp.gmail.com 
          server_port: 587 
          username: ${{ secrets.EMAIL_USERNAME }} 
          password: ${{ secrets.EMAIL_PASSWORD }} 
          subject: "❌ Pipeline Failed - Vulnerabilities Found" 
          body: "SonarQube detected issues. Please check the dashboard." 
          to: ${{ secrets.EMAIL_TO }} 
          from: GitHub Actions 
          
      - name: Send Email - Success 
        if: steps.qualitygate.outputs.status == 'OK' 
        uses: dawidd6/action-send-mail@v3 
        with: 
          server_address: smtp.gmail.com 
          server_port: 587 
          username: ${{ secrets.EMAIL_USERNAME }} 
          password: ${{ secrets.EMAIL_PASSWORD }} 
          subject: "✅ Pipeline Successful" 
          body: "No vulnerabilities found. Code quality is good." 
          to: ${{ secrets.EMAIL_TO }} 
          from: GitHub Actions
